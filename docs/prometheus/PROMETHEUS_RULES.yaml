apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kuberhealthy-rules
  namespace: kuberhealthy
spec:
  groups:
    - name: kuberhealthy.rules
      rules:
        - alert: HealthCheckFailed
          expr: kuberhealthy_check == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "HealthCheck failing"
            description: "HealthCheck {{ $labels.check }} in {{ $labels.namespace }} is failing."
        - alert: HealthCheckStale
          expr: kuberhealthy_check_seconds_since_success > 1800
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "HealthCheck stale"
            description: "HealthCheck {{ $labels.check }} has not reported OK within the expected window."
        - alert: KuberhealthyNoLeader
          expr: max(kuberhealthy_controller_leader) < 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Kuberhealthy leader missing"
            description: "No leader elected for Kuberhealthy; check controller health."
